name: Release Claim Readiness

on:
  workflow_dispatch:

jobs:
  claim_gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check release-readiness claim gate
        run: node scripts/check-release-readiness.mjs
